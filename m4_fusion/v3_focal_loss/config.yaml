train:
  batch_size: 32
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  dropout: 0.3
  loss_weights: {plaque: 1.0, echo: 0.5, risk: 0.5}
  pos_weight_auto: true
  pos_weight_scale: 1.2
  focal_gamma: 2.0         # Focal Loss gamma (0=BCE, 2=standard focal)
  patience: 7

eval:
  decision_threshold: "auto"

improvements:
  - Tất cả v2 (WeightedSampler + optimal threshold + pos_weight_scale=1.2)
  - Focal Loss thay BCE cho head plaque (gamma=2.0)
