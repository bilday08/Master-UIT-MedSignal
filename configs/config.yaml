# Cau hinh trung tam cho toan bo pipeline.
# Moi notebook/script doc file nay -> deu dung chung duong dan & sieu tham so.

data:
  # Thu muc goc dataset (tuong doi voi PROJECT root, hoac tuyet doi tren Colab).
  root: "clinical_carotid_dataset_v3"
  csv: "clinical_carotid_dataset_v3/carotid_clinical_dataset_300cases.csv"
  images_dir: "clinical_carotid_dataset_v3/CAROTID_IMAGES"
  image_size: 256
  image_mode: "L"          # grayscale 8-bit -> 1 channel

# Cot du lieu (KHOP CHINH XAC voi CSV thuc te - da verify).
columns:
  id: "Patient_ID"
  # Dac trung tabular dua vao model (Sex se duoc encode 0/1).
  numeric:
    - "Age"
    - "Lp(a)_mg_dL"
    - "ApoB_mg_dL"
    - "LDL_C_mg_dL"
    - "Triglyceride_mg_dL"
    - "Total_Cholesterol_mg_dL"
    - "Non_HDL_mg_dL"
    - "IMT_mm"
  categorical:
    - "Sex"                # Male/Female -> 1/0
  images: "Associated_Images"
  # Nhan cho 3 task.
  target_plaque: "Plaque_present"          # 0/1  (THUC TE: 205/95)
  target_echo: "Plaque_echogenicity"       # None/Low/Intermediate/High
  target_risk: "Baseline_Risk_Score"       # REGRESSION (Risk_Category suy bien 293/7 -> khong dung)

labels:
  # Echogenicity chi dinh nghia tren ca duong; "None" la ca am -> ignore_index khi tinh CE.
  echo_classes: ["Low", "Intermediate", "High"]
  echo_none: "None"

split:
  n_folds: 5
  stratify_on: "Plaque_present"   # long can bang echo trong nhom duong (xem splits.py)
  seed: 42

train:
  batch_size: 16
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  dropout: 0.3
  # Trong so multi-task loss (M4 co the doi sang uncertainty weighting).
  loss_weights:
    plaque: 1.0
    echo: 0.5
    risk: 0.5
  # Xu ly mat can bang lop plaque (95/205 ~ 32% duong).
  pos_weight_auto: true     # tu tinh pos_weight = n_neg/n_pos cho BCE

vision:
  encoder: "resnet18"       # "resnet18" | "custom_cnn"
  feat_dim: 128
  pretrained: false         # anh gia lap grayscale -> train tu dau goi

tabular:
  hidden: [64, 32]
  feat_dim: 32

fusion:
  type: "concat"            # "concat" | "bilinear"
  use_cca_in_fusion: false  # CCA chu yeu cho head echo; bat neu muon dua vao fusion

eval:
  # Nguong discordance GIU NGUYEN goc - bao cao trung thuc (n=18, 6 duong).
  discordance_ldl_max: 130
  discordance_lpa_min: 50
  decision_threshold: 0.5
